name: MSMP
version: '1.1.0'
main: com.msmp.MSMPPlugin
api-version: '1.21'
author: You
description: Кастомные мобы, спавнеры, система телепортов по уровню XP

commands:
  msmp:
    description: Главная команда плагина MSMP
    usage: /msmp <create|edit|delete|list|state>
    permission: msmp.admin

permissions:
  msmp.admin:
    description: Доступ к управлению мобами, спавнерами и locate-системой
    default: op
